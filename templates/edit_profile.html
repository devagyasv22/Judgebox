{% extends "base.html" %}
{% load widget_tweaks %}

{% block title %}Edit profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h1 class="h3 mb-4">Edit profile</h1>
    <form method="post" class="oj-card p-4">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field|add_class:"form-control" }}
        {% if field.errors %}
        <div class="text-danger small">{{ field.errors }}</div>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-oj-primary">Save</button>
      <a class="btn btn-outline-secondary ms-2" href="{% url 'profile' %}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
